name: edumaxsys
description: "EduMax System - Full-Stack Laravel & Flutter Offline-First Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Network
  dio: ^5.8.0+1
  
  # Local Database
  sqflite: ^2.4.2
  path: ^1.9.1
  
  # Secure Storage for Tokens
  flutter_secure_storage: ^9.2.4
  
  # Connectivity
  connectivity_plus: ^6.1.4
  
  # UUID Generation
  uuid: ^4.5.1
  
  # Date Formatting
  intl: ^0.20.2
  
  # Image Picker
  image_picker: ^1.1.2
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Path Provider
  path_provider: ^2.1.5
  
  # Permission Handler
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
